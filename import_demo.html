function log(msg, cls) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += '<div class="'+(cls||'')+'">'+msg+'</div>';
}

function importDemo() {
  // Fusion CRM
  var existing = [];
  try { existing = JSON.parse(localStorage.getItem('crm_btp_db') || '[]'); } catch(e) {}
  var added = 0;
  CRM_DEMO.forEach(function(p) {
    if (!existing.find(function(e){ return e.id === p.id; })) { existing.push(p); added++; }
  });
  localStorage.setItem('crm_btp_db', JSON.stringify(existing));
  log('✓ CRM : '+added+' prospects ajoutés ('+existing.length+' total)', 'ok');

  // Fusion candidats
  var existingC = [];
  try { existingC = JSON.parse(localStorage.getItem('cands_btp_v2') || '[]'); } catch(e) {}
  var addedC = 0;
  CANDS_DEMO.forEach(function(c) {
    if (!existingC.find(function(e){ return e.id === c.id; })) { existingC.push(c); addedC++; }
  });
  localStorage.setItem('cands_btp_v2', JSON.stringify(existingC));
  log('✓ Candidats : '+addedC+' ajoutés ('+existingC.length+' total)', 'ok');

  log('→ Retourne sur index.html et actualise la page', 'warn');
}

function clearAll() {
  if (!confirm('Vider TOUTES les données ? Cette action est irréversible.')) return;
  ['crm_btp_db','cands_btp_v2','flc_clients','grilles_btp','agence_btp','tdb_cfg','crm_kpi_semaine','tdb_spark_marge'].forEach(function(k){ localStorage.removeItem(k); });
  log('✓ Toutes les données supprimées', 'ok');
}
