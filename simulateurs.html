<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>JTIpilot — Simulateurs</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.sim-nav{display:flex;gap:4px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sim-btn{padding:7px 14px;border-radius:5px;border:1px solid var(--border);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;letter-spacing:.4px}
.sim-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.sim-btn:hover:not(.active){border-color:var(--orange);color:var(--orange)}
.rule-card{background:var(--surface);border:1px solid var(--border2);border-radius:6px;margin-bottom:10px;overflow:hidden}
.rule-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;background:var(--surface2)}
.rule-head:hover{background:var(--surface3)}
.rule-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text2)}
.rule-sub{font-size:10px;color:var(--orange);font-family:var(--mono);margin-top:2px}
.rule-body{padding:12px 16px;border-top:1px solid var(--border2);display:none;font-size:12px;line-height:1.7;color:var(--text2)}
.rule-body.open{display:block}
.obj-card{background:var(--surface);border:1px solid var(--border2);border-radius:6px;margin-bottom:10px;overflow:hidden}
.obj-head{padding:12px 16px;cursor:pointer;background:var(--surface2);display:flex;align-items:flex-start;gap:10px}
.obj-head:hover{background:var(--surface3)}
.obj-num{width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.obj-body{padding:14px 16px;border-top:1px solid var(--border2);display:none}
.obj-body.open{display:block}
.rep-block{background:var(--green-lt);border:1px solid rgba(22,163,74,.2);border-radius:5px;padding:10px 12px;margin-bottom:10px}
.rep-head{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);letter-spacing:.4px;margin-bottom:6px}
.arg-block{background:var(--blue-lt);border:1px solid rgba(37,99,235,.15);border-radius:5px;padding:10px 12px;margin-bottom:8px}
.arg-head{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-md);letter-spacing:.4px;margin-bottom:6px}
.pl-kpi{text-align:center;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px}
.pl-kpi-num{font-size:20px;font-weight:700;font-family:var(--mono)}
.pl-kpi-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:3px;letter-spacing:.3px}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-logo">⚡ <span>JTI</span>pilot</div>
  <a href="index.html" class="nav-link"><span class="nav-icon">📊</span>Tableau de bord</a>
  <a href="interimaires.html" class="nav-link"><span class="nav-icon">👷</span>Intérimaires</a>
  <a href="prospects.html" class="nav-link"><span class="nav-icon">🏢</span>Prospects / Clients</a>
  <a href="missions.html" class="nav-link"><span class="nav-icon">📋</span>Missions</a>
  <a href="simulateurs.html" class="nav-link active"><span class="nav-icon">🧮</span>Simulateurs</a>
</nav>

<div style="display:flex;flex-direction:column;height:calc(100vh - 48px)">
<div class="sim-nav">
  <button class="sim-btn active" id="btn-marge" onclick="showSim('marge',this)">🧮 Calculateur Marge</button>
  <button class="sim-btn" id="btn-pl" onclick="showSim('pl',this)">📈 Simulateur P&amp;L</button>
  <button class="sim-btn" id="btn-juridique" onclick="showSim('juridique',this)">⚖ Guide Juridique</button>
  <button class="sim-btn" id="btn-objections" onclick="showSim('objections',this)">💬 Objections Direction</button>
  <button class="sim-btn" id="btn-baremes" onclick="showSim('baremes',this)">📋 Barèmes BTP IDF</button>
</div>
<div style="flex:1;overflow-y:auto;padding:20px 24px;max-width:1000px;width:100%" id="sim-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// JTIPILOT — Simulateurs
// ═══════════════════════════════════════════════════════════════

var ITR_ZONES=[
  {label:'Z1 ≤5km',val:2.20},{label:'Z2 5→10km',val:4.50},{label:'Z3 10→20km',val:6.80},
  {label:'Z4 20→30km',val:9.15},{label:'Z5 30→40km',val:11.50},{label:'Z6 40→50km',val:13.85},{label:'Z7 >50km',val:16.20}
];

function fmt2(n){return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function fmtK(n){return n>=1000?(n/1000).toFixed(1)+'k€':Math.round(n)+'€';}

// ── NAVIGATION ──
var currentSim='marge';
function showSim(name,btn){
  currentSim=name;
  document.querySelectorAll('.sim-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var body=document.getElementById('sim-body');
  if(name==='marge') body.innerHTML=renderMarge();
  else if(name==='pl') body.innerHTML=renderPL();
  else if(name==='juridique') body.innerHTML=renderJuridique();
  else if(name==='objections') body.innerHTML=renderObjections();
  else if(name==='baremes') body.innerHTML=renderBaremes();
  if(name==='marge') setTimeout(calcMarge,50);
  if(name==='pl') setTimeout(calcPL,50);
}

// Init
document.getElementById('sim-body').innerHTML=renderMarge();
setTimeout(calcMarge,50);

// ══════════════════════════════════════
// CALCULATEUR MARGE COMPLET
// ══════════════════════════════════════
function renderMarge(){
  return '<h2 style="font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text2)">🧮 CALCULATEUR MARGE — BTP IDF</h2>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'

  // COLONNE GAUCHE — inputs
  +'<div>'
  +'<div class="sec"><div class="sec-head">PARAMÈTRES DE BASE</div><div class="sec-body"><div class="form-grid">'
  +'<div class="field"><label>TAUX BRUT CANDIDAT (€/H)</label><input id="mg_tb" type="number" step="0.5" value="16.50" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>HEURES NORMALES / SEM</label><input id="mg_hn" type="number" step="0.5" value="35" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>HS +25% (36e→43e h)</label><input id="mg_hs25" type="number" step="0.5" value="0" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>HS +50% (≥44e h)</label><input id="mg_hs50" type="number" step="0.5" value="0" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>NB SEMAINES</label><input id="mg_sem" type="number" value="4" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>CHARGES PATRONALES (%)</label><input id="mg_charges" type="number" step="0.5" value="43" oninput="calcMarge()"/></div>'
  +'</div></div></div>'

  +'<div class="sec"><div class="sec-head">ACCESSOIRES</div><div class="sec-body"><div class="form-grid">'
  +'<div class="field"><label>PANIER REPAS (€/j)</label><input id="mg_pan_val" type="number" step="0.1" value="10.10" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>NB PANIERS / SEM</label><input id="mg_pan_nb" type="number" value="5" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>ZONE ITR</label><select id="mg_itr_zone" onchange="applyZoneITR();calcMarge()">'
  +'<option value="0">Sans ITR</option>'
  +ITR_ZONES.map(function(z){return '<option value="'+z.val+'">'+z.label+' ('+z.val+' €)</option>';}).join('')
  +'</select></div>'
  +'<div class="field"><label>MONTANT ITR (€/j)</label><input id="mg_itr_val" type="number" step="0.1" value="0" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>NB JOURS ITR / SEM</label><input id="mg_itr_nb" type="number" value="5" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>PRIME RISQUE (%TB)</label><input id="mg_risque" type="number" step="0.5" value="0" oninput="calcMarge()"/></div>'
  +'</div></div></div>'

  +'<div class="sec"><div class="sec-head">TAUX DE FACTURATION</div><div class="sec-body"><div class="form-grid">'
  +'<div class="field"><label>OBJECTIF MARGE (%)</label><input id="mg_marge_pct" type="number" step="0.5" value="18" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>TAUX CLIENT (€/H)</label><input id="mg_tc" type="number" step="0.5" value="" placeholder="Auto ou manuel" oninput="calcMarge()"/></div>'
  +'<div class="field"><label>COEFFICIENT</label><input id="mg_coeff" type="number" step="0.01" value="" placeholder="Ex : 2.10" oninput="calcMarge()"/></div>'
  +'</div>'
  +'<div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:var(--mono)">Coeff × 2.05 min · × 2.20 objectif · × 2.40 profils rares</div>'
  +'</div></div>'
  +'</div>'

  // COLONNE DROITE — résultats
  +'<div>'
  +'<div class="sec"><div class="sec-head" style="color:var(--orange)">RÉSULTATS — SEMAINE</div><div class="sec-body">'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_ca" style="color:var(--orange)">—</div><div class="pl-kpi-lbl">CA / SEMAINE</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_cout" style="color:var(--blue)">—</div><div class="pl-kpi-lbl">COÛT ETT / SEM</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_marge" style="color:var(--green)">—</div><div class="pl-kpi-lbl">MARGE € / SEM</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_pct">—</div><div class="pl-kpi-lbl">MARGE %</div></div>'
  +'</div>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_ca_total" style="color:var(--orange);font-size:16px">—</div><div class="pl-kpi-lbl">CA TOTAL MISSION</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_marge_total" style="color:var(--green);font-size:16px">—</div><div class="pl-kpi-lbl">MARGE TOTALE</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_taux_fact" style="color:var(--cyan);font-size:16px">—</div><div class="pl-kpi-lbl">TAUX FACTURATION €/H</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="r_coeff" style="color:var(--purple);font-size:16px">—</div><div class="pl-kpi-lbl">COEFFICIENT</div></div>'
  +'</div></div></div>'

  +'<div class="sec"><div class="sec-head">DÉCOMPOSITION COÛT ETT / SEMAINE</div><div class="sec-body">'
  +'<table class="tbl" id="r_detail"><tbody></tbody></table>'
  +'</div></div>'

  +'<div class="sec"><div class="sec-head" style="color:var(--muted)">SIMULATION 3 SCÉNARIOS</div><div class="sec-body">'
  +'<table class="tbl"><thead><tr><th>Coefficient</th><th>Taux client €/h</th><th>Marge %</th><th>Signal</th></tr></thead>'
  +'<tbody id="r_scenarios"></tbody></table>'
  +'</div></div>'

  +'</div>'
  +'</div>';
}

function applyZoneITR(){
  var sel=document.getElementById('mg_itr_zone');
  var inp=document.getElementById('mg_itr_val');
  if(sel&&inp&&sel.value!=='0') inp.value=sel.value;
}

function calcMarge(){
  var tb=parseFloat(document.getElementById('mg_tb').value)||0;
  var hn=parseFloat(document.getElementById('mg_hn').value)||35;
  var hs25=parseFloat(document.getElementById('mg_hs25').value)||0;
  var hs50=parseFloat(document.getElementById('mg_hs50').value)||0;
  var sem=parseFloat(document.getElementById('mg_sem').value)||4;
  var chPct=(parseFloat(document.getElementById('mg_charges').value)||43)/100;
  var panVal=parseFloat(document.getElementById('mg_pan_val').value)||10.10;
  var panNb=parseFloat(document.getElementById('mg_pan_nb').value)||5;
  var itrVal=parseFloat(document.getElementById('mg_itr_val').value)||0;
  var itrNb=parseFloat(document.getElementById('mg_itr_nb').value)||5;
  var risquePct=(parseFloat(document.getElementById('mg_risque').value)||0)/100;
  var margePct=(parseFloat(document.getElementById('mg_marge_pct').value)||18)/100;
  var tcManuel=parseFloat(document.getElementById('mg_tc').value)||0;
  var coeffManuel=parseFloat(document.getElementById('mg_coeff').value)||0;
  if(!tb)return;

  var hTotal=hn+hs25+hs50;
  var brutSem=hn*tb + hs25*tb*1.25 + hs50*tb*1.50;
  var primeRisque=brutSem*risquePct;
  var brutBase=brutSem+primeRisque;
  var ifm=brutBase*0.10;
  var icp=(brutBase+ifm)*0.10;
  var charges=(brutBase+ifm)*chPct;
  var panTotal=panVal*panNb;
  var itrTotal=itrVal*itrNb;
  var acc=panTotal+itrTotal;
  var coutSem=brutBase+ifm+icp+charges+acc;

  // Taux de facturation
  var caHeuresSem, caSem, margeSem, pctReel, tFact;
  if(tcManuel>0){
    caHeuresSem=tcManuel*hTotal; caSem=caHeuresSem+acc;
    margeSem=caSem-coutSem; pctReel=caSem?margeSem/caSem*100:0;
    tFact=tcManuel;
  } else if(coeffManuel>0){
    caHeuresSem=tb*hTotal*coeffManuel; caSem=caHeuresSem+acc;
    margeSem=caSem-coutSem; pctReel=caSem?margeSem/caSem*100:0;
    tFact=caHeuresSem/hTotal;
  } else {
    var baseSanAcc=brutBase+ifm+icp+charges;
    caHeuresSem=baseSanAcc/(1-margePct); caSem=caHeuresSem+acc;
    margeSem=caSem-coutSem; pctReel=caSem?margeSem/caSem*100:0;
    tFact=caHeuresSem/hTotal;
  }
  var coeff=hTotal>0?tFact/tb:0;

  var pctColor=pctReel>=18?'var(--green)':pctReel>=12?'var(--yellow)':'var(--warn)';
  var set=function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};
  var setColor=function(id,c){var el=document.getElementById(id);if(el)el.style.color=c;};

  set('r_ca',fmtK(caSem)); set('r_cout',fmtK(coutSem));
  set('r_marge',fmtK(margeSem)); set('r_pct',pctReel.toFixed(1)+'%');
  set('r_ca_total',fmtK(caSem*sem)); set('r_marge_total',fmtK(margeSem*sem));
  set('r_taux_fact',tFact.toFixed(2)+' €/h'); set('r_coeff','×'+coeff.toFixed(2));
  setColor('r_pct',pctColor); setColor('r_marge','var(--green)'); setColor('r_marge_total','var(--green)');

  // Détail
  var rows=[
    ['Brut semaine ('+hn+'h norm'+(hs25?'+'+hs25+'h×1.25':'')+(hs50?'+'+hs50+'h×1.50':'')+')',brutBase],
    ['IFM (10%)',ifm],['ICP (10%×(brut+IFM))',icp],['Charges patronales ('+Math.round(chPct*100)+'%)',charges],
    ['Panier repas ('+panNb+'×'+panVal+'€)',panTotal],['ITR/IPD ('+itrNb+'×'+itrVal+'€)',itrTotal],
    ['<strong>COÛT TOTAL ETT / SEM</strong>','<strong>'+fmt2(coutSem)+'</strong>'],
  ];
  var tbl=document.getElementById('r_detail');
  if(tbl){tbl.innerHTML='<tbody>'+rows.map(function(r){return '<tr><td style="font-size:11px">'+r[0]+'</td><td style="font-family:var(--mono);font-size:11px;text-align:right">'+r[1]+'</td></tr>';}).join('')+'</tbody>';}

  // Scénarios
  var scenarios=[{coeff:2.05,label:'Minimum'},{coeff:2.20,label:'Objectif'},{coeff:2.40,label:'Profil rare'}];
  var sc=document.getElementById('r_scenarios');
  if(sc){sc.innerHTML=scenarios.map(function(s){
    var tc_s=tb*s.coeff; var ca_s=tc_s*hTotal+acc; var mb_s=ca_s?(ca_s-(brutBase+ifm+icp+charges+acc))/ca_s*100:0;
    var color=mb_s>=18?'var(--green)':mb_s>=12?'var(--yellow)':'var(--warn)';
    return '<tr><td style="font-family:var(--mono);font-weight:700">×'+s.coeff+'<br><small style="color:var(--muted)">'+s.label+'</small></td>'
      +'<td style="font-family:var(--mono);font-weight:700">'+tc_s.toFixed(2)+'</td>'
      +'<td style="font-family:var(--mono);font-weight:700;color:'+color+'">'+mb_s.toFixed(1)+'%</td>'
      +'<td style="font-size:11px">'+(mb_s>=18?'✅ Rentable':mb_s>=12?'⚠ Limite':'❌ Insuffisant')+'</td></tr>';
  }).join('');}
}

// ══════════════════════════════════════
// SIMULATEUR P&L
// ══════════════════════════════════════
function renderPL(){
  return '<h2 style="font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text2)">📈 SIMULATEUR P&L AGENCE BTP</h2>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'
  +'<div>'
  +'<div class="sec"><div class="sec-head">ACTIVITÉ</div><div class="sec-body"><div class="form-grid">'
  +'<div class="field"><label>INTÉRIMAIRES EN MISSION / SEM</label><input id="pl_etp" type="number" value="15" oninput="calcPL()"/></div>'
  +'<div class="field"><label>TAUX BRUT MOYEN (€/H)</label><input id="pl_tb" type="number" step="0.5" value="16.50" oninput="calcPL()"/></div>'
  +'<div class="field"><label>TAUX CLIENT MOYEN (€/H)</label><input id="pl_tc" type="number" step="0.5" value="25.00" oninput="calcPL()"/></div>'
  +'<div class="field"><label>HEURES MOYENNES / SEM</label><input id="pl_h" type="number" step="0.5" value="35" oninput="calcPL()"/></div>'
  +'<div class="field"><label>SEMAINES ACTIVES / AN</label><input id="pl_sem" type="number" value="47" oninput="calcPL()"/></div>'
  +'<div class="field"><label>% ACCESSOIRES SUR CA</label><input id="pl_acc_pct" type="number" step="0.5" value="5" oninput="calcPL()"/></div>'
  +'</div></div></div>'

  +'<div class="sec"><div class="sec-head">STRUCTURE DE COÛTS AGENCE</div><div class="sec-body"><div class="form-grid">'
  +'<div class="field"><label>SALAIRE RA BRUT / MOIS (€)</label><input id="pl_ra_salaire" type="number" value="3500" oninput="calcPL()"/></div>'
  +'<div class="field"><label>NB CHARGÉS DE COMPTE</label><input id="pl_cc_nb" type="number" value="0" oninput="calcPL()"/></div>'
  +'<div class="field"><label>SALAIRE CC BRUT / MOIS (€)</label><input id="pl_cc_salaire" type="number" value="2500" oninput="calcPL()"/></div>'
  +'<div class="field"><label>LOYER AGENCE / MOIS (€)</label><input id="pl_loyer" type="number" value="1500" oninput="calcPL()"/></div>'
  +'<div class="field"><label>FRAIS VARIABLES / MOIS (€)</label><input id="pl_frais_var" type="number" value="800" oninput="calcPL()"/></div>'
  +'<div class="field"><label>CHARGES ÉQUIPE (%)</label><input id="pl_charges_eq" type="number" value="45" oninput="calcPL()"/></div>'
  +'</div></div></div>'
  +'</div>'

  +'<div>'
  +'<div class="sec"><div class="sec-head" style="color:var(--orange)">RÉSULTATS ANNUELS</div><div class="sec-body">'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_ca" style="color:var(--orange)">—</div><div class="pl-kpi-lbl">CA BRUT</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_mb" style="color:var(--green)">—</div><div class="pl-kpi-lbl">MARGE BRUTE</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_mb_pct" style="color:var(--green)">—</div><div class="pl-kpi-lbl">MARGE BRUTE %</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_frais" style="color:var(--blue)">—</div><div class="pl-kpi-lbl">FRAIS FIXES</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_rbe" style="color:var(--purple)">—</div><div class="pl-kpi-lbl">RBE / RÉSULTAT</div></div>'
  +'<div class="pl-kpi"><div class="pl-kpi-num" id="pl_r_rbe_pct" style="color:var(--purple)">—</div><div class="pl-kpi-lbl">RBE %</div></div>'
  +'</div>'
  +'<div class="pl-kpi" style="margin-bottom:12px"><div class="pl-kpi-num" id="pl_r_seuil" style="color:var(--cyan)">—</div><div class="pl-kpi-lbl">SEUIL DE RENTABILITÉ (ETP)</div></div>'
  +'</div></div>'

  +'<div class="sec"><div class="sec-head">COMPTE DE RÉSULTAT SIMPLIFIÉ</div><div class="sec-body">'
  +'<table class="tbl"><tbody id="pl_detail"></tbody></table>'
  +'</div></div>'
  +'</div>'
  +'</div>';
}

function calcPL(){
  var etp=parseFloat(document.getElementById('pl_etp').value)||0;
  var tb=parseFloat(document.getElementById('pl_tb').value)||0;
  var tc=parseFloat(document.getElementById('pl_tc').value)||0;
  var h=parseFloat(document.getElementById('pl_h').value)||35;
  var sem=parseFloat(document.getElementById('pl_sem').value)||47;
  var accPct=(parseFloat(document.getElementById('pl_acc_pct').value)||5)/100;
  var raSal=parseFloat(document.getElementById('pl_ra_salaire').value)||3500;
  var ccNb=parseFloat(document.getElementById('pl_cc_nb').value)||0;
  var ccSal=parseFloat(document.getElementById('pl_cc_salaire').value)||2500;
  var loyer=parseFloat(document.getElementById('pl_loyer').value)||1500;
  var fraisVar=parseFloat(document.getElementById('pl_frais_var').value)||800;
  var chEq=(parseFloat(document.getElementById('pl_charges_eq').value)||45)/100;

  var caSem=tc*h*etp;
  var caAn=caSem*sem*(1+accPct);
  var coutSem=(tb*(1+0.10+0.10*1.10)*h*etp)*1.43;
  var coutAn=coutSem*sem;
  var mb=caAn-coutAn;
  var mbPct=caAn?mb/caAn*100:0;

  var fraissEq=((raSal+ccNb*ccSal)*(1+chEq))*12;
  var fraisFixAn=(loyer+fraisVar)*12;
  var totalFrais=fraissEq+fraisFixAn;
  var rbe=mb-totalFrais;
  var rbePct=caAn?rbe/caAn*100:0;

  var mbParEtp=etp>0?mb/etp:0;
  var seuilEtp=mbParEtp>0?totalFrais/mbParEtp:0;

  function f(n){return n>=1000000?(n/1000000).toFixed(2)+'M€':n>=1000?(n/1000).toFixed(1)+'k€':Math.round(n)+'€';}
  var set=function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};
  var setColor=function(id,c){var el=document.getElementById(id);if(el)el.style.color=c;};

  set('pl_r_ca',f(caAn)); set('pl_r_mb',f(mb));
  set('pl_r_mb_pct',mbPct.toFixed(1)+'%');
  set('pl_r_frais',f(totalFrais));
  set('pl_r_rbe',f(rbe)); set('pl_r_rbe_pct',rbePct.toFixed(1)+'%');
  setColor('pl_r_rbe',rbe>=0?'var(--green)':'var(--warn)');
  setColor('pl_r_rbe_pct',rbePct>=5?'var(--green)':rbePct>=0?'var(--yellow)':'var(--warn)');
  set('pl_r_seuil',seuilEtp.toFixed(1)+' ETP moy.');

  var rows=[
    ['CA facturation intérimaires',f(caAn),''],
    ['— Coût intérimaires (brut+IFM+ICP+ch. pat.)','-'+f(coutAn),'var(--warn)'],
    ['= MARGE BRUTE',f(mb),mbPct>=18?'var(--green)':mbPct>=12?'var(--yellow)':'var(--warn)'],
    ['Frais d\'équipe (RA + CC + charges)','-'+f(fraissEq),'var(--blue)'],
    ['Frais fixes (loyer + variables)','-'+f(fraisFixAn),'var(--blue)'],
    ['= RBE / RÉSULTAT',f(rbe),rbe>=0?'var(--green)':'var(--warn)'],
  ];
  var d=document.getElementById('pl_detail');
  if(d) d.innerHTML=rows.map(function(r){return '<tr><td style="font-size:12px">'+r[0]+'</td><td style="font-family:var(--mono);font-weight:700;text-align:right;color:'+(r[2]||'var(--text)')+'">'+r[1]+'</td></tr>';}).join('');
}

    {title:'SANTÉ & SÉCURITÉ — RESPONSABILITÉS',sub:'Art. L.1251-21 — Partage ETT / EU',body:'L\'EU assume la responsabilité des conditions de travail et de la sécurité sur le chantier.<br>L\'ETT vérifie la qualification, remet les EPI nécessaires, informe des risques particuliers.<br><br>Visite médicale obligatoire avant affectation à un poste à risque (Art. R.4624-23).<br>L\'ETT a obligation de transmettre la fiche de risques à la médecine du travail.<br><br><b style="color:var(--warn)">AT sur chantier :</b> déclaration dans les 24h, mise en jeu responsabilité EU + ETT. Faute inexcusable si risque connu non signalé.'},

  ];

  return '<h2 style="font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text2)">⚖ GUIDE JURIDIQUE INTÉRIM BTP</h2>'

      args:['Coût réel de gestion d\'un intérimaire ETT vs CDI intérimaire = -40% charges administratives pour vous.','Comparaison correcte : notre marge vs votre coût de recrutement direct (annonce 500–2000€, entretiens, vérifications, onboarding).','Sur un accord-cadre 20 ETP, notre marge peut baisser de 2 points avec engagement durée.'],

        +'<div style="background:var(--warn-lt);border:1px solid rgba(220,38,38,.15);border-radius:5px;padding:8px 12px;font-size:11px"><span style="font-weight:700;color:var(--warn)">⚠ PIÈGE À ÉVITER :</span> '+o.danger+'</div>'
        +'</div></div>';
    }).join('');
}
function toggleObj(head){var body=head.nextElementSibling;body.classList.toggle('open');head.querySelector('span').textContent=body.classList.contains('open')?'▲':'▼';}

    +'<div class="sec" style="margin-top:12px"><div class="sec-head" style="color:var(--orange)">COEFFICIENTS MULTIPLICATEURS DE RÉFÉRENCE</div><div class="sec-body">'
    +'<table class="tbl"><thead><tr><th>Niveau</th><th>Coeff</th><th>Usage</th></tr></thead><tbody>'
    +'<tr><td>Plancher</td><td style="font-family:var(--mono);font-weight:700;color:var(--warn)">×2.05</td><td style="font-size:11px">Seuil minimum — marge brute ~10%</td></tr>'
    +'<tr><td>Standard</td><td style="font-family:var(--mono);font-weight:700;color:var(--yellow)">×2.20</td><td style="font-size:11px">Objectif agence — marge brute ~18%</td></tr>'
    +'<tr><td>Profil rare</td><td style="font-family:var(--mono);font-weight:700;color:var(--green)">×2.40</td><td style="font-size:11px">CVC confirmé, élec HTA, CACES multi — marge brute ~25%</td></tr>'
    +'<tr><td>Accord-cadre</td><td style="font-family:var(--mono);font-weight:700;color:var(--blue-md)">Négocié</td><td style="font-size:11px">Sur volume garanti — généralement 1.85–2.10</td></tr>'
    +'</tbody></table></div></div>'

    +'<div class="sec" style="margin-top:12px"><div class="sec-head">RAPPEL CALCUL CHARGES</div><div class="sec-body">'
    +'<table class="tbl"><thead><tr><th>Élément</th><th>Taux / Règle</th></tr></thead><tbody>'
    +'<tr><td>IFM</td><td style="font-family:var(--mono);font-weight:700">10% brut</td></tr>'
    +'<tr><td>ICP</td><td style="font-family:var(--mono);font-weight:700">10% × (brut + IFM)</td></tr>'
    +'<tr><td>Charges patronales BTP IDF</td><td style="font-family:var(--mono);font-weight:700">≈43% base (brut + IFM)</td></tr>'
    +'<tr><td>HS +25%</td><td style="font-family:var(--mono)">36e → 43e heure semaine (contingent 220h/an)</td></tr>'
    +'<tr><td>HS +50%</td><td style="font-family:var(--mono)">44e heure et au-delà</td></tr>'
    +'<tr><td>Panier repas (plafond exo.)</td><td style="font-family:var(--mono)">10,10 €/j sédentaire</td></tr>'
    +'</tbody></table></div></div>';

  return html;
}
